# Investigation Node
# This node is linked to the Context node and uses context.person_name and context.location.
node: investigation
depends_on: "context.yaml"
context_inputs:
  - person_name
  - location
  - monogram
  - linkedin_url
subject:
  name_from_context: true
  location_from_context: true
  audience:
    - Employers
    - Collaborators
    - Internship opportunities
    - Technology communities
    - Professional networking audiences
  positioning:
    - Technology enthusiast
    - Early-career technologist
    - Python community volunteer
    - STEM advocate
profile:
  tagline: "Early-career technologist, Python community volunteer, and STEM advocate."
  about: "I'm Adam Bell, a technology enthusiast from Portlaoise, Ireland. My interests span Python development, embedded systems, medical technology, and community volunteering. I enjoy building solutions that make a positive impact and contributing to the STEM community."
projects:
  - title: "Non-Invasive Medical Vitals Monitor"
    description: "A device for measuring heartbeat, oxygen saturation, and temperature using PPG methods."
    evidence: "LinkedIn profile snippet"
  - title: "Screen-Time & Behaviour Study"
    description: "A research study exploring screen-time and social/emotional behaviour with 250+ student responses and 60+ teacher responses."
    evidence: "LinkedIn profile snippet"
  - title: "More projects coming soon"
    description: "A reserved space for future verified work, demos, or case studies."
    status: "future"
experience:
  - organization: "Pyca Ireland"
    role: "Member"
    details: "Associated with Pyca Ireland."
  - organization: "Python Ireland / PyCon 2025"
    role: "Staff Volunteer"
    details: "Volunteer support for the Python Ireland community and PyCon 2025."
  - organization: "TEAM HOPE"
    role: "Logistics Volunteer"
    dates: "Dec 2024–Jan 2025"
    details: "Sorted shoeboxes in Portlaoise."
skills:
  - "Python"
  - "Embedded Systems"
  - "Research"
  - "Data Analysis"
  - "Problem Solving"
  - "Community Engagement"
certifications:
  - "Microsoft Learning Credential"
  - "Manual Handling Training"
sources:
  - label: "LinkedIn profile snippet"
    url: "https://ie.linkedin.com/in/adam-bell-ireland"
constraints:
  - "Use verified facts only."
  - "No unsupported employment claims."
  - "Static HTML with Tailwind CSS via CDN."
  - "Context node feeds the investigation node for easy name/location updates."


